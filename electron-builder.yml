appId: me.amittiwari.gage
productName: gage
directories:
  output: release
files:
  - out/**
  - resources/**
  - package.json
extraResources:
  - from: statusline
    to: statusline
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - dir # unsigned local build; no dmg/notarization
  extendInfo:
    LSUIElement: 1 # menu-bar agent app, no dock icon
asarUnpack:
  - '**/*.node' # keep the better-sqlite3 native binary loadable
